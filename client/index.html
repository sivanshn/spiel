<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polizei gegen Dieb | Online</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <!-- Screen 1: Login -->
        <section id="screen-login" class="screen active">
            <div class="glass-card animate-in">
                <div class="logo">POLIZEI <span>vs</span> DIEB</div>
                <p class="subtitle">Ein rundenbasiertes Strategie-Abenteuer</p>
                <div class="input-group">
                    <input type="text" id="username" placeholder="NAME EINGEBEN..." maxlength="15" autocomplete="off" autofocus>
                    <button id="join-btn">EINTRETEN</button>
                </div>
            </div>
        </section>

        <!-- Screen 2: Game View -->
        <section id="screen-game" class="screen">
            <div class="game-hud">
                <div class="hud-left">
                    <div class="hud-item"><span id="player-role">Warten...</span></div>
                    <div class="hud-item">DIAMANTEN: <span id="diamond-counter">0 / 2</span></div>
                </div>
                <div class="hud-center">
                    <div id="game-phase" class="hud-item phase-highlight">Lobby</div>
                </div>
                <div class="hud-right">
                    <div id="turn-timer" class="hud-item timer">60s</div>
                    <div id="round-counter" class="hud-item">RUNDE 1</div>
                    <button id="btn-debug-start" class="debug-btn">DEBUG: START</button>
                </div>
            </div>

            <div id="map-viewport">
                <svg id="game-map" viewBox="0 0 1000 1000"></svg>
            </div>

            <div class="game-footer">
                <div id="player-status-bar"></div>
                <div id="action-bar" class="hidden">
                    <button id="btn-move" class="action-btn hidden">MOVE (2 ÜBRIG)</button>
                    <button id="btn-investigate" class="action-btn secondary hidden">UNTERSUCHEN (2 ÜBRIG)</button>
                    <button id="btn-arrest" class="action-btn secondary hidden">FESTNAHME</button>
                    <button id="btn-end-turn" class="action-btn">ZUG BEENDEN</button>
                </div>
            </div>
        </section>

        <!-- Screen 3: Result -->
        <section id="screen-result" class="screen">
            <div class="result-card">
                <h1 id="result-title">SIEG</h1>
                <p id="result-msg">Der Dieb ist entkommen!</p>
            </div>
        </section>

        <!-- Custom Notification Modal -->
        <div id="notification-modal" class="modal hidden">
            <div class="glass-card modal-content animate-in">
                <h2 id="modal-title">INFO</h2>
                <p id="modal-msg"></p>
                <button id="modal-close" class="action-btn">OK</button>
            </div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
